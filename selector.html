<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Selector de menú | Catering</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="comidas.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2>Menú</h2>

    <button onclick="irSeccion('entrantes')">Entrantes</button>
    <button onclick="irSeccion('ensaladas')">Ensaladas</button>
    <button onclick="irSeccion('carnes')">Carnes</button>
    <button onclick="irSeccion('platos-calientes')">Platos calientes</button>
    <button onclick="irSeccion('postres')">Postres</button>
    <button onclick="irSeccion('bebidas')">Bebidas</button>

    <hr>

    <div id="infoCliente"></div>

    <h3>Resumen</h3>
    <ul id="lista"></ul>

    <p id="total"></p>

    <button onclick="continuar()" class="continuar">
      Continuar
    </button>

  </aside>


  <!-- CONTENIDO -->
  <main class="contenido">

    <section id="entrantes" class="seccion">
      <h2>Entrantes</h2>
      <div class="productos"></div>
    </section>

    <section id="ensaladas" class="seccion">
      <h2>Ensaladas</h2>
      <div class="productos"></div>
    </section>

    <section id="carnes" class="seccion">
      <h2>Carnes</h2>
      <div class="productos"></div>
    </section>

    <section id="platos-calientes" class="seccion">
      <h2>Platos calientes</h2>
      <div class="productos"></div>
    </section>

    <section id="postres" class="seccion">
      <h2>Postres</h2>
      <div class="productos"></div>
    </section>

    <section id="bebidas" class="seccion">
      <h2>Bebidas</h2>
      <div class="productos"></div>
    </section>

  </main>

</div>


<!-- VISOR DE IMAGEN -->
<div id="visorImagen" class="visor-imagen">
  <img id="imagenGrande">
</div>

<script src="productos.js"></script>
<script src="selector.js"></script>

</body>
</html>
