<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pedir presupuesto | Catering Gil y Román</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #555;
      margin-bottom: 25px;
    }

    form {
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      padding: 12px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .mensaje {
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
      display: none;
    }

    .ok { color: #0a7; }
    .error { color: #c00; }
  </style>
</head>

<body>

  <div class="container">
    <h1>Pedir presupuesto</h1>
    <p>Cuéntanos los datos básicos de tu evento</p>

    <div id="mensaje" class="mensaje"></div>

    <form id="formPresupuesto">

      <input type="text" id="nombre" placeholder="Nombre completo" required />
      <input type="tel" id="telefono" placeholder="Teléfono" required />
      <input type="email" id="email" placeholder="Email" required />
      
      <label for="fechaEvento">Fecha de celebración del evento</label>
      <input type="date" id="fechaEvento" required />

      <button type="submit">Continuar</button>

    </form>
  </div>

  <!-- LÓGICA -->
  <script type="module">
    import { db } from "./firebase.js";
    import {
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const form = document.getElementById("formPresupuesto");
    const mensaje = document.getElementById("mensaje");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      mensaje.style.display = "none";

      const nombre = document.getElementById("nombre").value.trim();
      const telefono = document.getElementById("telefono").value.trim();
      const email = document.getElementById("email").value.trim();
      const fechaEvento = document.getElementById("fechaEvento").value;

      const presupuestoActual = {
        nombre,
        telefono,
        email,
        fechaEvento,
        carrito: [],
        extras: {},
        creadoEn: Date.now()
      };

      localStorage.setItem("presupuesto", JSON.stringify(presupuestoActual));

      const clienteRef = doc(db, "clientes", telefono);
      const clienteSnap = await getDoc(clienteRef);

      if (!clienteSnap.exists()) {
        await setDoc(clienteRef, {
          nombre,
          email,
          telefono,
          pedidosTotales: 0,
          totalGastado: 0,
          esFrecuente: false,
          fechaPrimerPedido: serverTimestamp()
        });
      }

      window.location.href = "selector.html";
    });
  </script>

</body>
</html>
